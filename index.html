<!DOCTYPE html>
<html lang="Pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enciclopédia da amizade</title>
    <link rel="icon" href="favicon.png" type="png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
         <span>Dicionário dos meus amigos</span>
         <div class="botoes">
            <button onclick="alternarTema()" id="btn-tema">☀️/🌙</button>
            <button type="button" id="btn-modo">MODO</button>
        </div>
    </header>
<main>

    <div id="AlertaErro1" class="container">
        <p id="Modos">Adicionar caracteristicas:</p>
  <input type="text" id="input-cadastro-nome" placeholder="Nome do amigo"/>
  <input type="text" id="input-cadastro-gosta" placeholder="O que gosta?"/>
  <button type="button" id="btn-adicionar">Adicionar</button>
</div>



    <div id="AlertaErro2" class="container">
        <p>Pesquisar sobre:</p>

        <form>
            <div class="caixa-nome">
                <div class="inputName">
                    <input type="text" name="input-nome" id="input-nome"
                        placeholder="Nome do amigo"/>
                </div>
            </div>

                <div class="btn-container">
                    <button type="button" id="btn-buscar" class="btn-buscar">
                        Pesquisar
                    </button>
                </div>
        </form>
    </div>

    <div class="resultado-view">
        <p id="resultado">Esse amigo gosta de:</p>
    </div>
</main>

<footer>
       Feito por: Caio Vinicius, 2026.1   </footer>
    <script src="script.js"></script>

</body>
</html>
